{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <link rel="stylsheet" href="{% static '/styles/email.css' %}">
</head>
<body>
 <div>
  <div style="background: red; height: 60px"></div>
  <div style="
   display: flex;
   flex-direction: column; 
   align-items: center; 
   justify-content: center; 
   width: 800px;
  ">
    <img src="{% static 'seal-of-san-juan.png' %}"/>
    <p style="font-size: 24px">
     Congratulations, {{ last_name }}, {{ first_name }} {{ middle_name }}
     {% if suffix%}{{ suffix }}{% endif %} 
     you have been verified by the {{ city }}, {{ province }} LGU as a solo parent 
     citizen. You are now eligible for benefits as prescribed to you by the 
     R.A. 8972.
    </p>
   </div>
   <div style="background: red; height: 60px"></div>
 </div>
</body>
</html>
